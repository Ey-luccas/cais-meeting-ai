version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: cais-meeting-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cais_meeting_ai
      MYSQL_USER: cais
      MYSQL_PASSWORD: cais
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: cais-meeting-ai-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  mysql_data:
